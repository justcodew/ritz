name: release

# tag 推送 v* 时触发：构建多平台 wheel 并发布到 PyPI。
# 完整流程见 RELEASING.md。

on:
  push:
    tags: ['v*']

# 同 tag 重推时取消旧 run
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build wheel (${{ matrix.target }})
    # continue-on-error：单个 matrix 项失败（如 macos-13 runner 短缺超时）
    # 不阻塞其他平台 wheel 上传。publish 用 if: always() 仍会发布成功的 wheel。
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu,  manylinux: auto, cross_deps: '' }
          # Linux arm64（native ARM runner；manylinux=off 走 native build，绕开 Docker manylinux 容器在 arm64 runner 上失败的问题）
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, manylinux: 'off', cross_deps: '' }
          # macOS arm64（Apple Silicon runner）
          - { os: macos-14,        target: aarch64-apple-darwin,      manylinux: '',   cross_deps: '' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compile toolchain
        if: ${{ matrix.cross_deps != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

  # 可选：在 merge 到 test-release 分支时触发 TestPyPI 发布。
  # 用法见 RELEASING.md。使用 OIDC 可信发布，无需 API token secret。
  testpypi:
    name: publish to TestPyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/test-release'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish:
    name: publish to PyPI
    # if: always() 让 publish 即使部分 build 失败/queued 也跑；
    # 下载 artifact 时只拿到成功的 wheel（失败的 matrix 项不上传 artifact）。
    # skip-existing: true 防止重复上传冲突。
    if: startsWith(github.ref, 'refs/tags/v') && always()
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Check wheels exist
        run: |
          ls -la dist/
          if [ -z "$(ls dist/*.whl 2>/dev/null)" ]; then
            echo "ERROR: no wheels uploaded — all build jobs failed"
            exit 1
          fi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
