name: release

# tag 推送 v* 时触发：构建多平台 wheel 并发布到 PyPI。
# test-release 分支推送时触发 TestPyPI 发布。
# 完整流程见 RELEASING.md。

on:
  push:
    tags: ['v*']
    branches: [test-release]

# 同 tag 重推时取消旧 run
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build wheel (${{ matrix.target }})
    # continue-on-error：单个 matrix 项失败不阻塞其他平台 wheel 上传。
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu,  manylinux: auto, cross_deps: '' }
          # Linux arm64（native ARM runner，manylinux=off 走 native build）
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, manylinux: 'off', cross_deps: '' }
          # macOS arm64（Apple Silicon runner）
          - { os: macos-14,        target: aarch64-apple-darwin,      manylinux: '',   cross_deps: '' }
          # macOS x86_64（从 Apple Silicon 交叉编译）
          - { os: macos-14,        target: x86_64-apple-darwin,       manylinux: '',   cross_deps: '' }
          # Windows x86_64（MSBuild 编译 MuPDF）
          - { os: windows-latest,  target: x86_64-pc-windows-msvc,    manylinux: '',   cross_deps: '' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compile toolchain
        if: ${{ matrix.cross_deps != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Windows：用 MSBuild 编译 MuPDF 静态库（libmupdf + libthirdparty）
      # PowerShell 中分号是语句分隔符，用 backtick 转义
      - name: Build MuPDF (MSBuild, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targets = "libmupdf;libthirdparty"
          msbuild vendor/mupdf/platform/win32/mupdf.sln /t:$targets /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

  # TestPyPI 发布：仅在 test-release 分支推送时触发。
  # 注意：PyPI Trusted Publisher 需要配置 workflow=release.yml, environment=testpypi,
  # 且 "Allowed publishers" 的 workflow_ref 需匹配 refs/heads/test-release（不是 tag）。
  testpypi:
    name: publish to TestPyPI
    if: github.ref == 'refs/heads/test-release'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # PyPI 正式发布：仅在 tag push 时触发。
  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v') && always()
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Check wheels exist
        run: |
          ls -la dist/
          if [ -z "$(ls dist/*.whl 2>/dev/null)" ]; then
            echo "ERROR: no wheels uploaded — all build jobs failed"
            exit 1
          fi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
